name: Snyk Security Scan

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Test
        # The --all-projects flag is safest if your go.mod is hidden in a folder
        run: snyk test --sarif-file-output=snyk.sarif --all-projects
        continue-on-error: true 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Save SARIF as Downloadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sarif-report
          path: snyk.sarif
          retention-days: 5 # Keeps the file for 5 days to save space
